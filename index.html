<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>漢字×計算 野球ゲーム</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#f2f2f2;
}

#game{
margin-top:30px;
}

#question{
font-size:28px;
margin-bottom:20px;
}

#grid{
display:grid;
grid-template-columns:repeat(3,80px);
grid-gap:10px;
justify-content:center;
margin:20px auto;
}

.cell{
width:80px;
height:80px;
font-size:28px;
background:white;
border:2px solid #333;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

#bso{
position:absolute;
right:50px;
top:120px;
font-size:22px;
text-align:left;
}

#judge{
font-size:30px;
margin-top:20px;
height:40px;
}

button{
padding:10px 20px;
font-size:16px;
margin:5px;
}

</style>
</head>

<body>

<h1>漢字 × 計算 野球ゲーム</h1>

<div id="menu">

<div>
モード
<br>
<button onclick="startPitcher()">ピッチャー（計算）</button>
<button onclick="startBatter()">バッター（漢字）</button>
</div>

<div style="margin-top:20px">
学年
<br>
<select id="grade">
<option value="1">1年</option>
<option value="2">2年</option>
<option value="3">3年</option>
<option value="4">4年</option>
<option value="5">5年</option>
<option value="6">6年</option>
</select>
</div>

<div style="margin-top:20px">

問題タイプ
<br>
<select id="kanjiMode">
<option value="read">読み</option>
<option value="write">漢字</option>
</select>

</div>

<div style="margin-top:20px">

入力モード
<br>
<select id="device">
<option value="tablet">タブレット</option>
<option value="pc">PC</option>
</select>

</div>

</div>

<div id="game" style="display:none">

<div id="question"></div>

<div id="grid"></div>

<input id="pcInput" style="font-size:24px;display:none">

<div id="judge"></div>

</div>

<div id="bso">
B ⚪⚪⚪<br>
S ⚪⚪<br>
O ⚪⚪⚪
</div>

<script>

/* -------------------------
漢字データ（例）
-------------------------- */

const kanjiData={

1:["山","川","森","人","水","火","木","金","土","空"],

2:["雪","海","風","電","車","花","草","虫","魚","鳥"],

3:["駅","橋","港","島","湖","旅","薬","油","緑","表"]

}

/* -------------------------
ゲーム状態
-------------------------- */

let mode=""
let answer=""
let selected=""
let balls=0
let strikes=0
let outs=0

/* -------------------------
ゲーム開始
-------------------------- */

function startPitcher(){

mode="pitcher"
document.getElementById("menu").style.display="none"
document.getElementById("game").style.display="block"

newMath()

}

function startBatter(){

mode="batter"

document.getElementById("menu").style.display="none"
document.getElementById("game").style.display="block"

newKanji()

}

/* -------------------------
ピッチャー問題
-------------------------- */

function newMath(){

let a=Math.floor(Math.random()*9)+1
let b=Math.floor(Math.random()*9)+1

answer=(a+b).toString()

document.getElementById("question").innerText=a+" + "+b

createGrid(answer)

}

/* -------------------------
漢字問題
-------------------------- */

function newKanji(){

let grade=document.getElementById("grade").value

let list=kanjiData[grade]

let k=list[Math.floor(Math.random()*list.length)]

let type=document.getElementById("kanjiMode").value

if(type=="read"){

answer=toHiragana(k)

document.getElementById("question").innerHTML=

"太字の漢字の読みは？<br>わたしは <b>"+k+"</b> を見た"

}

else{

answer=k

document.getElementById("question").innerHTML=

"太字の読みの漢字は？<br>わたしは <b>"+toHiragana(k)+"</b> を見た"

}

createGrid(answer)

}

/* -------------------------
9マス生成
-------------------------- */

function createGrid(ans){

selected=""

let grid=document.getElementById("grid")

grid.innerHTML=""

let chars=ans.split("")

let pool="あいうえおかきくけこさしすせそたちつてとなにぬねの"

while(chars.length<9){

chars.push(pool[Math.floor(Math.random()*pool.length)])

}

chars.sort(()=>Math.random()-0.5)

chars.forEach(c=>{

let d=document.createElement("div")

d.className="cell"

d.innerText=c

d.onclick=()=>tap(c)

grid.appendChild(d)

})

}

/* -------------------------
タップ
-------------------------- */

function tap(c){

selected+=c

if(selected.length>=answer.length){

judge()

}

}

/* -------------------------
判定
-------------------------- */

function judge(){

if(selected==answer){

document.getElementById("judge").innerText="HIT"

}

else{

document.getElementById("judge").innerText="OUT"

outs++

}

setTimeout(next,1000)

}

/* -------------------------
次問題
-------------------------- */

function next(){

document.getElementById("judge").innerText=""

if(mode=="pitcher"){

newMath()

}

else{

newKanji()

}

}

/* -------------------------
簡易ひらがな変換
-------------------------- */

function toHiragana(k){

const map={
山:"やま",
川:"かわ",
森:"もり",
人:"ひと",
水:"みず",
火:"ひ",
木:"き",
金:"かね",
土:"つち",
空:"そら",
雪:"ゆき",
海:"うみ",
風:"かぜ",
電:"でん",
車:"くるま",
花:"はな",
草:"くさ",
虫:"むし",
魚:"さかな",
鳥:"とり"
}

return map[k]||""

}

</script>

</body>
</html>
