<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>計算野球ゲーム</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#f5f5f5;
}

#judge{
font-size:40px;
color:red;
height:50px;
}

#question{
font-size:40px;
margin:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,100px);
gap:10px;
justify-content:center;
margin-top:20px;
}

.cell{
width:100px;
height:100px;
font-size:32px;
background:white;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

button{
font-size:20px;
padding:10px 20px;
margin:10px;
}

</style>
</head>

<body>

<h2>計算野球ゲーム ⚾</h2>

<div id="menu">

<button onclick="selectMode('pitcher')">ピッチャー</button>
<button onclick="selectMode('batter')">バッター</button>

</div>

<div id="start"></div>

<div id="judge"></div>

<div id="question"></div>

<div class="grid" id="grid"></div>

<div id="result"></div>

<script>

let mode=""
let correctAnswer
let startTime

// pitcher
let strike=0
let ball=0
let hit=0
let strikeOut=0
let fourBalls=0
let questionCount=0

// batter
let batterQ=0
let batterWrong=0
let batterStart
let hr=0
let doubleHit=0
let singleHit=0
let out=0
let strikeOutB=0

function selectMode(m){

mode=m

document.getElementById("menu").innerHTML=""

document.getElementById("start").innerHTML=
'<button onclick="playBall()">プレイボール</button>'

}

function playBall(){

document.getElementById("start").innerHTML=""

resetAll()

newQuestion()

}

function resetAll(){

strike=0
ball=0
hit=0
strikeOut=0
fourBalls=0
questionCount=0

batterQ=0
batterWrong=0
hr=0
doubleHit=0
singleHit=0
out=0
strikeOutB=0

}

function newQuestion(){

let a=Math.floor(Math.random()*10)
let b=Math.floor(Math.random()*10)

correctAnswer=a+b

document.getElementById("question").innerText=a+" + "+b

createGrid()

startTime=Date.now()

if(mode=="batter" && batterQ==0){

batterStart=Date.now()

}

}

function createGrid(){

let grid=document.getElementById("grid")
grid.innerHTML=""

let nums=[]

while(nums.length<8){

let n=Math.floor(Math.random()*19)

if(n!=correctAnswer && !nums.includes(n)){
nums.push(n)
}

}

nums.push(correctAnswer)

nums.sort(()=>Math.random()-0.5)

nums.forEach(n=>{

let d=document.createElement("div")

d.className="cell"
d.innerText=n
d.onclick=()=>answer(n)

grid.appendChild(d)

})

}

function answer(n){

if(mode=="pitcher") pitcherMode(n)
if(mode=="batter") batterMode(n)

}

function showJudge(t){

document.getElementById("judge").innerText=t

setTimeout(()=>{
document.getElementById("judge").innerText=""
},800)

}

////////////////////////
// pitcher
////////////////////////

function pitcherMode(n){

let time=(Date.now()-startTime)/1000

questionCount++

if(n==correctAnswer && time<=1.5){

strike++
showJudge("STRIKE")

}

else if(n==correctAnswer){

ball++
showJudge("BALL")

}

else{

hit++
showJudge("HIT")

}

if(strike>=3){

strikeOut++
showJudge("STRIKE OUT")

resetPitchSet()

}

if(ball>=4){

fourBalls++
showJudge("FOUR BALLS")

resetPitchSet()

}

if(hit>=4 || hit+fourBalls>=4){

gameOver()

return

}

if(strikeOut>=3){

clearGame()

return

}

if(questionCount>=6){

resetPitchSet()

}

newQuestion()

}

function resetPitchSet(){

strike=0
ball=0
questionCount=0

}

////////////////////////
// batter
////////////////////////

function batterMode(n){

batterQ++

if(n!=correctAnswer){

batterWrong++

}

if(batterQ>=5){

judgeBatter()

return

}

newQuestion()

}

function judgeBatter(){

let time=(Date.now()-batterStart)/1000

let result=""

if(batterWrong==0){

if(time<=5){

result="HOME RUN"
hr++

}

else if(time<=7){

result="2BASE HIT"
doubleHit++

}

else if(time<=9){

result="HIT"
singleHit++

}

}

else if(batterWrong==1){

if(time<=7){

result="FOUR BALLS"
singleHit++

}else{

result="OUT"
out++

}

}

else if(batterWrong==2){

result="OUT"
out++

}

else if(batterWrong>=3){

result="STRIKE OUT"
strikeOutB++

}

showJudge(result)

if(strikeOutB>=3){

gameOver()

return

}

if(hr>=1){

clearGame()
return

}

if(doubleHit>=2){

clearGame()
return

}

if(doubleHit>=1 && singleHit>=2){

clearGame()
return

}

if(singleHit>=4){

clearGame()
return

}

if(out>=3){

gameOver()
return

}

batterQ=0
batterWrong=0

newQuestion()

}

////////////////////////

function gameOver(){

document.getElementById("result").innerHTML=
"<h2>GAME OVER</h2><button onclick='location.reload()'>ピッチャー交代</button>"

}

function clearGame(){

document.getElementById("result").innerHTML=
"<h2>クリア！</h2><button onclick='location.reload()'>次のイニング</button>"

}

</script>

</body>
</html>
