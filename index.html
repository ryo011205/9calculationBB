<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>計算野球ゲーム</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#f2f2f2;
}

#judge{
font-size:42px;
font-weight:bold;
color:red;
height:50px;
margin-top:10px;
}

#question{
font-size:40px;
margin:10px;
}

.gameArea{
position:relative;
display:inline-block;
}

.grid{

display:grid;
grid-template-columns:repeat(3,100px);
gap:10px;
padding:20px;

background-image:url("https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Baseball_catcher_silhouette.svg/512px-Baseball_catcher_silhouette.svg.png");
background-size:240px;
background-repeat:no-repeat;
background-position:center;

}

.cell{

width:100px;
height:100px;

font-size:34px;
font-weight:bold;

background:rgba(255,255,255,0.9);

border-radius:10px;

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;

}

.cell:hover{
background:#ddd;
}

#scoreboard{

position:absolute;
right:-120px;
bottom:0;
text-align:left;
font-size:20px;

}

.base{
margin-top:15px;
font-size:30px;
line-height:28px;
}

button{
font-size:20px;
padding:10px 20px;
margin:5px;
}

</style>
</head>

<body>

<h2>計算野球ゲーム ⚾</h2>

<button onclick="startGame()">スタート</button>

<div id="judge"></div>

<div id="question"></div>

<div class="gameArea">

<div class="grid" id="grid"></div>

<div id="scoreboard">

<div id="bso">B: ○○○<br>S: ○○<br>O: ○</div>

<div class="base" id="base">

◇<br>
◇ ◇

</div>

</div>

</div>

<div id="result"></div>

<script>

let correctAnswer

let windowQuestion=0
let wrongCount=0
let windowStart

let totalWrong=0
let outs=0

let ball=0
let strike=0
let out=0

let homerun=0
let doubleHit=0
let singleHit=0

function startGame(){

resetWindow()
newQuestion()

}

function resetWindow(){

windowQuestion=0
wrongCount=0
windowStart=Date.now()

}

function newQuestion(){

let a=Math.floor(Math.random()*10)
let b=Math.floor(Math.random()*10)

correctAnswer=a+b

document.getElementById("question").innerText=a+" + "+b

createGrid()

}

function createGrid(){

let grid=document.getElementById("grid")

grid.innerHTML=""

let numbers=[]

while(numbers.length<8){

let n=Math.floor(Math.random()*19)

if(n!=correctAnswer && !numbers.includes(n)){

numbers.push(n)

}

}

numbers.push(correctAnswer)

numbers.sort(()=>Math.random()-0.5)

numbers.forEach(num=>{

let div=document.createElement("div")

div.className="cell"

div.innerText=num

div.onclick=()=>answer(num)

grid.appendChild(div)

})

}

function answer(num){

windowQuestion++

if(num!=correctAnswer){

wrongCount++
totalWrong++
strike++

showJudge("STRIKE")

}else{

strike=0

}

updateBSO()

checkRules()

}

function checkRules(){

if(totalWrong>=9){

finish("3アウト！ゲームオーバー")

return

}

if(wrongCount>=3){

outs++
out++

showJudge("OUT")

resetWindow()

updateBSO()

}

if(windowQuestion>=6){

let time=(Date.now()-windowStart)/1000

let message=""

if(wrongCount==0){

if(time<=7){

message="HOME RUN！"
homerun++

}else if(time<=9){

message="2BASE hit"
doubleHit++

}

}

if(wrongCount<=2){

if(time<=8){

message="hit"
singleHit++

}else if(time<=10){

message="four balls"
singleHit++

}

}

showJudge(message)

resetWindow()

}

if(

homerun>=1 ||

doubleHit>=2 ||

(doubleHit>=1 && singleHit>=2) ||

singleHit>=4

){

finish("クリア！！")

return

}

newQuestion()

}

function showJudge(text){

document.getElementById("judge").innerText=text

setTimeout(()=>{

document.getElementById("judge").innerText=""

},1200)

}

function updateBSO(){

document.getElementById("bso").innerHTML=

"B: "+ball+"<br>"+
"S: "+strike+"<br>"+
"O: "+out

}

function finish(msg){

document.getElementById("result").innerText=msg

document.getElementById("grid").innerHTML=""

document.getElementById("question").innerText=""

}

</script>

</body>
</html>
