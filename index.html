<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>計算ストライクゲーム</title>

<style>

body{
font-family:sans-serif;
text-align:center;
}

#question{
font-size:40px;
margin:20px;
}

#status{
font-size:22px;
margin:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,100px);
gap:10px;
justify-content:center;
}

.cell{
width:100px;
height:100px;
font-size:35px;
background:#eee;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.cell:hover{
background:#ddd;
}

</style>
</head>

<body>

<h2>計算ストライクゲーム</h2>

<div id="question"></div>
<div id="status"></div>

<div class="grid" id="grid"></div>

<div id="result"></div>

<script>

let correctAnswer
let startTime

let strikeStreak=0
let strikeCount6=0
let ballCount6=0
let questionWindow=0

let outs=0
let ballSetCount=0
let strikeSetCount=0

function newQuestion(){

let a=Math.floor(Math.random()*10)
let b=Math.floor(Math.random()*10)

correctAnswer=a+b

document.getElementById("question").innerText=a+" + "+b

createGrid()

startTime=Date.now()

}

function createGrid(){

let grid=document.getElementById("grid")
grid.innerHTML=""

let numbers=[]

while(numbers.length<8){

let n=Math.floor(Math.random()*19)

if(n!=correctAnswer && !numbers.includes(n)){
numbers.push(n)
}

}

numbers.push(correctAnswer)

numbers.sort(()=>Math.random()-0.5)

numbers.forEach(num=>{

let div=document.createElement("div")
div.className="cell"
div.innerText=num
div.onclick=()=>answer(num)

grid.appendChild(div)

})

}

function answer(num){

let time=(Date.now()-startTime)/1000

let result=""

questionWindow++

if(num==correctAnswer && time<=1.5){

result="ストライク"

strikeStreak++
strikeCount6++

}else{

result="ボール"

strikeStreak=0
ballCount6++

}

document.getElementById("status").innerText=result+" ("+time.toFixed(2)+"秒)"

checkRules()

}

function checkRules(){

// 9連続ストライク
if(strikeStreak>=9){

finish("3アウト！クリア！")
return

}

// 3連続ストライク
if(strikeStreak>=3){

outs++
resetWindow()

}

// 6問以内3ストライク
if(strikeCount6>=3){

strikeSetCount++
outs++
resetWindow()

}

// 6問以内4ボール
if(ballCount6>=4){

ballSetCount++
resetWindow()

}

// クリア
if(strikeSetCount>=3){

finish("3アウト！クリア！")
return

}

// ゲームオーバー
if(ballSetCount>=4){

finish("ゲームオーバー")
return

}

// 6問終了リセット
if(questionWindow>=6){

resetWindow()

}

newQuestion()

}

function resetWindow(){

questionWindow=0
strikeCount6=0
ballCount6=0

}

function finish(msg){

document.getElementById("result").innerText=msg
document.getElementById("grid").innerHTML=""

}

newQuestion()

</script>

</body>
</html>
