<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>計算野球ゲーム</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#f5f5f5;
}

#judge{
font-size:38px;
height:50px;
color:red;
}

#question{
font-size:40px;
margin-bottom:10px;
}

.game{
display:flex;
justify-content:center;
gap:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,100px);
gap:10px;
}

.cell{
width:100px;
height:100px;
background:white;
border-radius:10px;
font-size:32px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
position:relative;
}

.mark{
position:absolute;
font-size:48px;
}

.correct{color:red}
.wrong{color:blue}

.light{
display:inline-block;
width:20px;
height:20px;
border-radius:50%;
background:#ddd;
margin:3px;
}

button{
font-size:20px;
padding:10px 20px;
margin:10px;
}

</style>
</head>

<body>

<h2>計算野球ゲーム ⚾</h2>

<button onclick="playBall()">プレイボール</button>

<div id="judge"></div>
<div id="question"></div>

<div class="game">

<div class="grid" id="grid"></div>

<div>

<div>B
<span class="light" id="b1"></span>
<span class="light" id="b2"></span>
<span class="light" id="b3"></span>
</div>

<div>S
<span class="light" id="s1"></span>
<span class="light" id="s2"></span>
</div>

<div>O
<span class="light" id="o1"></span>
<span class="light" id="o2"></span>
</div>

</div>

</div>

<div id="result"></div>

<script>

let correctAnswer
let startTime

let strike=0
let ball=0
let hit=0
let strikeOut=0
let fourBalls=0
let questionCount=0

function playBall(){

resetGame()
newQuestion()

}

function resetGame(){

strike=0
ball=0
hit=0
strikeOut=0
fourBalls=0
questionCount=0

updateBSO()

}

function newQuestion(){

let a=Math.floor(Math.random()*10)
let b=Math.floor(Math.random()*10)

correctAnswer=a+b

document.getElementById("question").innerText=a+" + "+b

createGrid()

startTime=Date.now()

}

function createGrid(){

let grid=document.getElementById("grid")
grid.innerHTML=""

let nums=[]

while(nums.length<8){

let n=Math.floor(Math.random()*19)

if(n!=correctAnswer && !nums.includes(n)) nums.push(n)

}

nums.push(correctAnswer)
nums.sort(()=>Math.random()-0.5)

nums.forEach(n=>{

let d=document.createElement("div")
d.className="cell"
d.innerText=n
d.onclick=()=>answer(d,n)

grid.appendChild(d)

})

}

function answer(cell,n){

let time=(Date.now()-startTime)/1000

if(n==correctAnswer){

showMark(cell,"◯","correct")

}else{

showMark(cell,"×","wrong")

}

pitcherJudge(n,time)

setTimeout(newQuestion,600)

}

function showMark(cell,symbol,type){

let m=document.createElement("div")
m.className="mark "+type
m.innerText=symbol
cell.appendChild(m)

}

function pitcherJudge(n,time){

questionCount++

if(time>=2 && n!=correctAnswer){

showJudge("HOME RUN")

gameOver()
return

}

if(n==correctAnswer && time<=1.2){

strike++
showJudge("STRIKE")

}

else if(n==correctAnswer && time>1.2 && time<=2){

ball++
showJudge("BALL")

}

else{

hit++
showJudge("HIT")

}

updateBSO()

if(strike>=3){

strikeOut++
showJudge("STRIKE OUT")

strike=0
ball=0
questionCount=0

}

if(ball>=4){

fourBalls++
showJudge("FOUR BALLS")

strike=0
ball=0
questionCount=0

}

if(hit>=4){

gameOver()
return

}

if(hit+fourBalls>=4){

gameOver()
return

}

if(strikeOut>=3){

clearGame()
return

}

if(questionCount>=6){

strike=0
ball=0
questionCount=0

}

}

function showJudge(text){

document.getElementById("judge").innerText=text

setTimeout(()=>{
document.getElementById("judge").innerText=""
},800)

}

function updateBSO(){

let b=[b1,b2,b3]
let s=[s1,s2]
let o=[o1,o2]

b.forEach(x=>x.style.background="#ddd")
s.forEach(x=>x.style.background="#ddd")
o.forEach(x=>x.style.background="#ddd")

for(let i=0;i<ball && i<3;i++){

b[i].style.background="green"

}

for(let i=0;i<strike && i<2;i++){

s[i].style.background="orange"

}

for(let i=0;i<strikeOut && i<2;i++){

o[i].style.background="red"

}

}

function gameOver(){

document.getElementById("result").innerHTML=

"<h2>GAME OVER</h2><button onclick='location.reload()'>ピッチャー交代</button>"

}

function clearGame(){

document.getElementById("result").innerHTML=

"<h2>クリア！</h2><button onclick='location.reload()'>次のイニング</button>"

}

</script>

</body>
</html>
